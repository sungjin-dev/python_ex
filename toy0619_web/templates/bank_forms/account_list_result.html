<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BANK SERVICE</title>

    <link href="{{url_for('static', filename='css/bank_css/common.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='css/bank_css/index.css')}}" rel="stylesheet">

</head>
<body>
    
    {% include 'include/header.html' %}
    {% include 'include/bank_nav.html' %}


    <article>
    <h3>고객 계좌 목록</h3>
    <ul>
        {% for accNo, value in accounts.items() %}
            <li>
                <strong>계좌번호:</strong> {{ accNo }} 
                <strong>잔액:</strong> {{ value.bal }}
                <strong>생성일:</strong> {{ value.date }}
            </li>
        {% else %}
            <li>등록된 계좌가 없습니다.</li>
        {% endfor %}
    </ul>
</article>

  
</body>
</html>
