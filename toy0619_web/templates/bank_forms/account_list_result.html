<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BANK SERVICE</title>

    <link href="{{url_for('static', filename='css/bank_css/common.css')}}" rel="stylesheet">
    <link href="{{url_for('static', filename='css/bank_css/bank.css')}}" rel="stylesheet">

</head>
<body>
    
    {% include 'include/header.html' %}
    {% include 'include/bank_nav.html' %}

    <article id="account_list_wrap">
        <table class="account_list_table">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>ACCOUNT NUMBER</th>
                    <th>BALANCE</th>
                    <th>CREATED DATE</th>
                </tr>
            </thead>
            <tbody>
                {% for aNum, info in accounts %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td><a href="{{ url_for('bank.account_infos', aNum=aNum) }}">{{ aNum }}</a></td>
                    <td>{{ info.bal }}</td>
                    <td>{{ info.date }}</td>
                </tr>
                {% endfor %}
    </tbody>
</table>
    </article>

  
</body>
</html>
